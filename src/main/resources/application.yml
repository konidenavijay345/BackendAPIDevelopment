spring:
  application:
    name: backend-api-development
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/crud_api?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:${SERVER_PORT:8080}}
  tomcat:
    basedir: .
    accesslog:
      enabled: true
      directory: logs
      prefix: api-access
      suffix: .log
      pattern: '%t %a "%r" %s %D'
  error:
    include-message: never
    include-stacktrace: never

app:
  cors:
    allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://*.trycloudflare.com}}
  jwt:
    secret: ${JWT_SECRET}
    expiration: PT10M

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
